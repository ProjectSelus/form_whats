    <!-- Script Principal com Suporte a Módulos para Firebase (Mantido apenas estrutura) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // =========================================================================
        // CONFIGURAÇÃO DA PLANILHA GOOGLE (COLE O LINK ABAIXO)
        // =========================================================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDLDqgq7I1O9piwzosnMTnCYdm46jhG-uHu1tXMZ8_qMLfYmyjrILiUBz5lb_2QKo/exec";

        // =========================================================================
        // CONFIGURAÇÃO DO FIREBASE (OPCIONAL/DESATIVADO)
        // =========================================================================
        const firebaseConfig = {
            // apiKey: "SUA_API_KEY",
        };

        // Lógica de salvamento em planilha
        async function salvarNaPlanilha(dados) {
            const feedbackDb = document.getElementById('db-feedback');
            
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("COLE_SUA_URL")) {
                feedbackDb.textContent = "⚠️ URL da Planilha não configurada.";
                return;
            }

            feedbackDb.textContent = "Enviando para planilha...";

            try {
                // Adiciona data legível
                const dadosParaEnviar = {
                    ...dados,
                    dataLegivel: new Date().toLocaleString('pt-BR')
                };

                // Envia como POST request para o script
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para evitar erro de CORS
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(dadosParaEnviar)
                });

                feedbackDb.textContent = "✅ Enviado para planilha!";
                setTimeout(() => feedbackDb.textContent = "", 3000);

            } catch (error) {
                console.error('Erro ao salvar na planilha:', error);
                feedbackDb.textContent = "❌ Erro ao enviar para planilha.";
            }
        }

        // --- Código Original da Lógica do Formulário ---
        
        let tituloFormatado = "";

        function formatValue(value) { return value || '0'; }
        function formatText(text) { return text.trim() || 'Nada a constar'; }

        function setDynamicTitle() {
            const hoje = new Date();
            const ontem = new Date(hoje);
            ontem.setDate(hoje.getDate() - 1);

            const diaAnterior = String(ontem.getDate()).padStart(2, '0');
            const diaAtual = String(hoje.getDate()).padStart(2, '0');
            const mesFmt = String(hoje.getMonth() + 1).padStart(2, '0');
            const ano = hoje.getFullYear();

            tituloFormatado = `Resumo do serviço do dia ${diaAnterior} para o dia ${diaAtual}/${mesFmt}/${ano}`;
            document.getElementById('titulo-relatorio').textContent = tituloFormatado;
        }

        function downloadTxtFile(content, opm) {
            const now = new Date();
            const ano = now.getFullYear();
            const mes = String(now.getMonth() + 1).padStart(2, '0');
            const dia = String(now.getDate()).padStart(2, '0');
            const horas = String(now.getHours()).padStart(2, '0');
            const minutos = String(now.getMinutes()).padStart(2, '0');
            const opmSafe = opm.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const filename = `${ano}-${mes}-${dia}-${horas}${minutos}-${opmSafe}.txt`;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const element = document.createElement('a');
            element.href = URL.createObjectURL(blob);
            element.download = filename;
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        document.addEventListener('DOMContentLoaded', () => {
            setDynamicTitle();

            const feedbackElement = document.getElementById('copy-feedback');
            const form = document.getElementById('report-form');
            const limparBtn = document.getElementById('limpar-btn');
            const visualizarBtn = document.getElementById('visualizar-btn');
            const previewContainer = document.getElementById('preview-container');
            const previewContent = document.getElementById('preview-content');
            const whatsappBtn = document.getElementById('whatsapp-btn');

            function generateReportString() {
                const opmRadio = document.querySelector('input[name="opm"]:checked');
                const opm = opmRadio ? opmRadio.value : "";
                
                if (!opm) {
                    feedbackElement.textContent = 'Por favor, selecione a OPM.';
                    feedbackElement.classList.remove('text-green-600');
                    feedbackElement.classList.add('text-red-600');
                    setTimeout(() => {
                         feedbackElement.textContent = '';
                         feedbackElement.classList.remove('text-red-600');
                         feedbackElement.classList.add('text-green-600');
                    }, 2000);
                    return null;
                }

                const rawData = {
                    opm: opm,
                    viaturas: document.getElementById('viaturas').value,
                    efetivo: document.getElementById('efetivo').value,
                    ocorrencias: formatValue(document.getElementById('ocorrencias-atendidas').value),
                    veiculosAbordados: formatValue(document.getElementById('veiculos-abordados').value),
                    pessoasAbordadas: formatValue(document.getElementById('pessoas-abordadas').value),
                    aits: formatValue(document.getElementById('aits').value),
                    sinistros: formatValue(document.getElementById('sinistros').value),
                    veiculosCrime: formatValue(document.getElementById('veiculos-apreendidos-crime').value),
                    veiculosFisc: formatValue(document.getElementById('veiculos-apreendidos-fisc').value),
                    veiculosRecuperados: formatValue(document.getElementById('veiculos-recuperados').value),
                    armas: formatValue(document.getElementById('armas-apreendidas').value),
                    pessoasDpc: formatValue(document.getElementById('pessoas-dpc').value),
                    menores: formatValue(document.getElementById('menores-apreendidos').value),
                    pessoasPresas: formatValue(document.getElementById('pessoas-presas').value),
                    mandados: formatValue(document.getElementById('mandados-prisao').value),
                    proerd: formatValue(document.getElementById('palestras-proerd').value),
                    mpu: formatValue(document.getElementById('mpu-fiscalizadas').value),
                    palestrasTransito: formatValue(document.getElementById('palestras-transito').value),
                    palestrasPromuseEscolas: formatValue(document.getElementById('palestras-promuse-escolas').value),
                    palestrasPromuseFabricas: formatValue(document.getElementById('palestras-promuse-fabricas').value),
                    drogas: formatText(document.getElementById('drogas-apreendidas').value),
                    outrasApreensoes: formatText(document.getElementById('outras-apreensoes').value),
                    qtdRos: formatValue(document.getElementById('quantidade-ros').value),
                    descRos: formatText(document.getElementById('descricao-ros').value),
                    obs: formatText(document.getElementById('observacao').value)
                };

                const newHeader = `*🚔🚨 14ª CIPM - ${rawData.opm} 🚨🚔*`;

                const reportString = `
${newHeader}
${tituloFormatado}
Viaturas Empregadas: ${rawData.viaturas}
Efetivo empregado: ${rawData.efetivo}
---
Ocorrências Atendidas: ${rawData.ocorrencias}
Veículos abordados: ${rawData.veiculosAbordados}
Pessoas abordadas: ${rawData.pessoasAbordadas}
AITs: ${rawData.aits}
Sinistros de Trânsito Atendidos: ${rawData.sinistros}
Veículos Apreendidos (crime): ${rawData.veiculosCrime}
Veículos Apreendidos (fiscalização): ${rawData.veiculosFisc}
Veículos Recuperados: ${rawData.veiculosRecuperados}
Armas de fogo apreendidas: ${rawData.armas}
Pessoas encaminhadas a DPC: ${rawData.pessoasDpc}
Menores apreendidos: ${rawData.menores}
Pessoas Presas flagrante/TCO: ${rawData.pessoasPresas}
Mandados de Prisões cumpridos: ${rawData.mandados}
Palestras PROERD: ${rawData.proerd}
MPU fiscalizadas: ${rawData.mpu}
Palestras de Trânsito nas Escolas: ${rawData.palestrasTransito}
Palestras Promuse nas Escolas: ${rawData.palestrasPromuseEscolas}
Palestras Promuse/Transito em Fábricas ou Indústrias: ${rawData.palestrasPromuseFabricas}
---
Drogas apreendidas: ${rawData.drogas}
Outras apreensões: ${rawData.outrasApreensoes}
Quantidade de RO's: ${rawData.qtdRos}
Descrição/Numeros dos RO's: ${rawData.descRos}
Observação: ${rawData.obs}
`.trim();

                return { text: reportString, data: rawData };
            }

            visualizarBtn.addEventListener('click', () => {
                const result = generateReportString();
                if (result) {
                    previewContent.textContent = result.text;
                    previewContainer.classList.remove('hidden');
                    previewContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });

            whatsappBtn.addEventListener('click', () => {
                const result = generateReportString();
                if (result) {
                    // 1. Download do Arquivo .txt
                   // downloadTxtFile(result.text, result.data.opm);

                    // 2. Salvar na Planilha Google
                    salvarNaPlanilha(result.data);

                    // 3. Abrir WhatsApp
                    const encodedText = encodeURIComponent(result.text);
                    window.open(`https://api.whatsapp.com/send?text=${encodedText}`, '_blank');
                    
                    previewContainer.classList.add('hidden');
                    feedbackElement.textContent = 'Baixando, salvando na planilha e abrindo WhatsApp...';
                    setTimeout(() => {
                         feedbackElement.textContent = '';
                    }, 4000);
                }
            });

            limparBtn.addEventListener('click', () => {
                form.reset();
                feedbackElement.textContent = '';
                document.getElementById('db-feedback').textContent = '';
                previewContainer.classList.add('hidden');
            });
        });
    </script>

</body>
</html>
